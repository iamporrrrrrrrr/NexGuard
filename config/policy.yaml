# DevGuard Risk Policy Configuration
# TODO: define thresholds and rules for blast radius scoring

risk:
  green:
    max_score: 30
    auto_execute: true
  yellow:
    max_score: 70
    veto_window_hours: 1
  red:
    min_score: 71
    requires_explicit_approval: true

fail_safe:
  # Patterns that always trigger RED regardless of score
  # Keep these very specific to avoid false positives on YELLOW tickets
  always_red_patterns:
    - "drop table"
    - "drop column"
    - "rm -rf"
    - "node_tls_reject_unauthorized"

incident:
  countdown_seconds: 45
